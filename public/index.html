<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>لوحة تحكم إدماج</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a73e8;--primary-hover:#1557b0;--primary-light:#e8f0fe;
  --bg:#f8f9fa;--surface:#fff;--border:#dadce0;
  --danger:#d93025;--danger-hover:#b3261e;
  --success:#1e8e3e;--success-hover:#137333;
  --text:#202124;--text-secondary:#5f6368;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 4px 16px rgba(0,0,0,.12);
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* Login */
.login-wrap{display:none;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-card{background:var(--surface);padding:2.5rem 2rem;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:380px;max-width:100%}
.login-card h1{text-align:center;margin-bottom:.5rem;font-size:1.5rem;font-weight:600;color:var(--text)}
.login-card .subtitle{text-align:center;color:var(--text-secondary);margin-bottom:2rem;font-size:.9rem}
.login-card .field{margin-bottom:1rem}
.login-card .field label{display:block;font-size:.85rem;font-weight:500;margin-bottom:.35rem;color:var(--text)}
.login-card .field input{width:100%;padding:.65rem .85rem;border:1px solid var(--border);border-radius:var(--radius);font-size:.95rem;transition:border-color .2s}
.login-card .field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
.login-card button{width:100%;padding:.7rem;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:.95rem;font-weight:500;cursor:pointer;transition:background .2s;margin-top:.5rem}
.login-card button:hover{background:var(--primary-hover)}
.login-error{color:var(--danger);font-size:.85rem;margin-bottom:.75rem;text-align:center;display:none;padding:.5rem;background:#fce8e6;border-radius:var(--radius)}

/* App Shell */
.app{display:none}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:1.1rem;font-weight:600;color:var(--text)}
.topbar .right{display:flex;align-items:center;gap:.75rem}
.topbar .admin-name{font-size:.85rem;color:var(--text-secondary)}
.topbar .btn-logout{background:none;border:1px solid var(--border);padding:.4rem .85rem;border-radius:var(--radius);cursor:pointer;font-size:.85rem;color:var(--text-secondary);transition:all .2s}
.topbar .btn-logout:hover{border-color:var(--danger);color:var(--danger)}

.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs button{background:none;border:none;padding:.7rem 1.1rem;font-size:.9rem;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-secondary);transition:all .15s;white-space:nowrap;font-weight:500}
.tabs button.active{color:var(--primary);border-bottom-color:var(--primary)}
.tabs button:hover{color:var(--primary);background:var(--primary-light)}

.panel{display:none;padding:1.5rem;max-width:1200px;margin:0 auto}
.panel.active{display:block}

/* Cards & Tables */
.card{background:var(--surface);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1.25rem;box-shadow:var(--shadow);border:1px solid var(--border)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.card-header h2{font-size:1rem;font-weight:600;color:var(--text)}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:500px}
th,td{text-align:right;padding:.65rem .75rem;font-size:.875rem}
th{background:var(--bg);font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);white-space:nowrap}
td{border-bottom:1px solid #f0f0f0}
tr:hover td{background:#fafbfc}
.thumb-cell img{width:40px;height:40px;border-radius:6px;object-fit:cover}
.thumb-cell .no-img{width:40px;height:40px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:12px;font-weight:600}

/* Buttons */
.btn{padding:.4rem .85rem;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:.8rem;font-weight:500;transition:all .15s;background:var(--surface);color:var(--text)}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-hover);border-color:var(--primary-hover)}
.btn-danger{background:none;color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-sm{padding:.3rem .65rem;font-size:.75rem}
.actions{display:flex;gap:.35rem}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem}
.stat-card{background:var(--surface);border-radius:var(--radius-lg);padding:1.25rem;box-shadow:var(--shadow);border:1px solid var(--border);transition:transform .15s}
.stat-card:hover{transform:translateY(-2px)}
.stat-card .label{font-size:.8rem;color:var(--text-secondary);font-weight:500;margin-bottom:.5rem}
.stat-card .value{font-size:1.8rem;font-weight:700;color:var(--primary)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-start;justify-content:center;z-index:1000;padding:2rem 1rem;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:580px;max-width:100%;box-shadow:var(--shadow-lg);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.modal-head{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-size:1rem;font-weight:600}
.modal-head .close-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-secondary);padding:.25rem;line-height:1}
.modal-head .close-btn:hover{color:var(--text)}
.modal-body{padding:1.5rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.85rem;font-weight:500;margin-bottom:.35rem;color:var(--text)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.55rem .75rem;border:1px solid var(--border);border-radius:var(--radius);font-size:.9rem;transition:border-color .15s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
.form-group textarea{min-height:90px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.form-divider{text-align:center;color:var(--text-secondary);font-size:.8rem;margin:-.25rem 0 .75rem;position:relative}
.form-divider::before,.form-divider::after{content:'';position:absolute;top:50%;width:35%;height:1px;background:var(--border)}
.form-divider::before{right:0}
.form-divider::after{left:0}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.5rem}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:.85rem;text-align:center;cursor:pointer;transition:all .15s;margin-top:.35rem;font-size:.85rem;color:var(--text-secondary)}
.upload-zone:hover{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.upload-zone input[type=file]{display:none}
.upload-zone .preview{max-width:100px;max-height:70px;border-radius:6px;margin-top:.4rem}
.upload-status{font-size:.8rem;margin-top:.35rem;padding:.4rem .6rem;border-radius:var(--radius);display:none}
.upload-status.info{display:block;background:var(--primary-light);color:var(--primary)}
.upload-status.ok{display:block;background:#e6f4ea;color:var(--success)}
.upload-status.err{display:block;background:#fce8e6;color:var(--danger)}
.progress-bar{width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:.35rem;overflow:hidden;display:none}
.progress-bar.show{display:block}
.progress-bar .fill{height:100%;background:var(--primary);border-radius:2px;transition:width .15s}
.badge{display:inline-block;padding:.15rem .5rem;border-radius:10px;font-size:.75rem;font-weight:500}
.badge-admin{background:var(--primary-light);color:var(--primary)}
.badge-user{background:var(--bg);color:var(--text-secondary)}
.badge-yes{background:#e6f4ea;color:var(--success)}
.badge-no{background:#fce8e6;color:var(--danger)}

/* Loading & Toast */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);display:none;align-items:center;justify-content:center;z-index:2000;flex-direction:column;gap:.75rem}
.loading-overlay.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay .msg{font-size:.9rem;color:var(--text-secondary);font-weight:500}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);padding:.6rem 1.25rem;border-radius:var(--radius);color:#fff;font-size:.875rem;z-index:3000;opacity:0;transition:all .25s;pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}

/* Responsive */
@media(max-width:768px){
  .topbar{padding:.6rem 1rem}
  .topbar h1{font-size:.95rem}
  .tabs{padding:0 .75rem}
  .tabs button{padding:.6rem .75rem;font-size:.82rem}
  .panel{padding:1rem}
  .stats-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem}
  .stat-card .value{font-size:1.4rem}
  .modal{width:100%}
  .form-row{grid-template-columns:1fr}
  .card{padding:1rem}
}
@media(max-width:480px){
  .topbar{flex-wrap:wrap;gap:.5rem}
  .topbar .right{width:100%;justify-content:flex-end}
  .stats-grid{grid-template-columns:1fr 1fr;gap:.5rem}
  .stat-card{padding:.85rem}
}
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><div class="msg" id="loadingMsg">جاري التحميل...</div></div>
<div class="toast" id="toast"></div>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1>لوحة تحكم إدماج</h1>
    <p class="subtitle">سجّل الدخول للمتابعة</p>
    <div class="login-error" id="loginErr"></div>
    <div class="field">
      <label>البريد الإلكتروني</label>
      <input type="email" id="loginEmail" autocomplete="email">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="loginPw" autocomplete="current-password">
    </div>
    <button onclick="doLogin()">تسجيل الدخول</button>
  </div>
</div>

<!-- App -->
<div class="app" id="app">
  <div class="topbar">
    <h1>لوحة تحكم إدماج</h1>
    <div class="right">
      <span class="admin-name" id="adminName"></span>
      <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>
    </div>
  </div>
  <div class="tabs">
    <button class="active" onclick="showTab('stats',this)">الإحصائيات</button>
    <button onclick="showTab('videos',this)">الفيديوهات</button>
    <button onclick="showTab('content',this)">المحتوى</button>
    <button onclick="showTab('users',this)">المستخدمون</button>
  </div>

  <div class="panel active" id="tab-stats">
    <div class="stats-grid" id="statsGrid"></div>
  </div>

  <div class="panel" id="tab-videos">
    <div class="card">
      <div class="card-header">
        <h2>قائمة الفيديوهات</h2>
        <button class="btn btn-primary" onclick="openVideoModal()">إضافة فيديو</button>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>الصورة</th><th>العنوان</th><th>التصنيف</th><th>المدة</th><th>إجراءات</th></tr></thead><tbody id="videosBody"></tbody></table>
      </div>
    </div>
  </div>

  <div class="panel" id="tab-content">
    <div class="card">
      <div class="card-header">
        <h2>قائمة المحتوى</h2>
        <button class="btn btn-primary" onclick="openContentModal()">إضافة محتوى</button>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>العنوان</th><th>النوع</th><th>التصنيف</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody id="contentBody"></tbody></table>
      </div>
    </div>
  </div>

  <div class="panel" id="tab-users">
    <div class="card">
      <div class="card-header">
        <h2>قائمة المستخدمين</h2>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>الاسم</th><th>البريد</th><th>الدور</th><th>إجراءات</th></tr></thead><tbody id="usersBody"></tbody></table>
      </div>
    </div>
  </div>
</div>

<!-- Video Modal -->
<div class="modal-overlay" id="videoModal">
<div class="modal">
  <div class="modal-head">
    <h2 id="videoModalTitle">إضافة فيديو</h2>
    <button class="close-btn" onclick="closeModal('videoModal')">&times;</button>
  </div>
  <div class="modal-body">
    <input type="hidden" id="videoId">
    <div class="form-group"><label>العنوان</label><input id="vTitle" placeholder="عنوان الفيديو"></div>
    <div class="form-group"><label>الوصف</label><textarea id="vDesc" placeholder="وصف مختصر للفيديو"></textarea></div>
    <div class="form-group"><label>رابط الفيديو (YouTube أو رابط خارجي)</label><input id="vUrl" dir="ltr" placeholder="https://youtube.com/watch?v=..."></div>
    <div class="form-divider">أو ارفع ملفاً</div>
    <div class="form-group">
      <label>رفع ملف فيديو / ملف مضغوط</label>
      <input type="file" id="vFile" accept="video/*,.zip,.tar,.gz,.rar,.7z" onchange="uploadVideoFile(this)" style="padding:.4rem">
      <div class="progress-bar" id="vProgressBar"><div class="fill" id="vProgressFill"></div></div>
      <div class="upload-status" id="vUploadStatus"></div>
    </div>
    <div class="form-group">
      <label>الصورة المصغرة</label>
      <input id="vThumb" dir="ltr" placeholder="رابط الصورة أو ارفع أدناه">
      <div class="upload-zone" onclick="document.getElementById('vThumbFile').click()">
        <span>اضغط لرفع صورة مصغرة</span>
        <input type="file" id="vThumbFile" accept="image/*" onchange="uploadThumbFile(this)">
        <div id="vThumbPreview"></div>
      </div>
      <div class="upload-status" id="vThumbUploadStatus"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>التصنيف</label>
        <select id="vCat">
          <option value="cv">كتابة السيرة الذاتية</option>
          <option value="interview">التحضير للمقابلة</option>
          <option value="skills">المهارات المطلوبة</option>
          <option value="softskills">المهارات الشخصية</option>
          <option value="opportunities">البحث عن الفرص</option>
          <option value="entrepreneurship">ريادة الأعمال</option>
        </select>
      </div>
      <div class="form-group"><label>المدة (ثواني)</label><input id="vDur" type="number" value="0"></div>
    </div>
    <div class="form-group"><label>الترتيب</label><input id="vOrder" type="number" value="0"></div>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal('videoModal')">إلغاء</button>
    <button class="btn btn-primary" id="videoSaveBtn" onclick="saveVideo()">حفظ</button>
  </div>
</div>
</div>

<!-- Content Modal -->
<div class="modal-overlay" id="contentModal">
<div class="modal">
  <div class="modal-head">
    <h2 id="contentModalTitle">إضافة محتوى</h2>
    <button class="close-btn" onclick="closeModal('contentModal')">&times;</button>
  </div>
  <div class="modal-body">
    <input type="hidden" id="contentId">
    <div class="form-group"><label>العنوان</label><input id="cTitle" placeholder="عنوان المحتوى"></div>
    <div class="form-row">
      <div class="form-group"><label>النوع</label>
        <select id="cType"><option value="article">مقال</option><option value="document">مستند</option><option value="guide">دليل</option></select>
      </div>
      <div class="form-group"><label>التصنيف</label><input id="cCategory" placeholder="مثال: مهارات"></div>
    </div>
    <div class="form-group"><label>المحتوى / النص</label><textarea id="cBody" rows="6" placeholder="اكتب المحتوى هنا..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>رابط الملف (اختياري)</label><input id="cFileUrl" dir="ltr" placeholder="https://..."></div>
      <div class="form-group"><label>رابط الصورة (اختياري)</label><input id="cImageUrl" dir="ltr" placeholder="https://..."></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>منشور</label>
        <select id="cPublished"><option value="true">نعم</option><option value="false">لا</option></select>
      </div>
      <div class="form-group"><label>الترتيب</label><input id="cOrder" type="number" value="0"></div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal('contentModal')">إلغاء</button>
    <button class="btn btn-primary" onclick="saveContent()">حفظ</button>
  </div>
</div>
</div>

<script>
const API=location.origin+'/api';
let token=localStorage.getItem('admin_token')||'';
const CHUNK_SIZE=4*1024*1024;
function headers(){return{'Content-Type':'application/json','Authorization':'Bearer '+token}}

async function api(method,path,body){
  const opts={method,headers:headers()};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(API+path,opts);
  if(r.status===401){logout();throw new Error('غير مصرح');}
  if(!r.ok){
    let msg='خطأ في الطلب';
    try{const j=await r.json();msg=Array.isArray(j.message)?j.message.join(', '):j.message||msg;}catch(_){msg=await r.text()||msg;}
    throw new Error(msg);
  }
  const text=await r.text();
  return text?JSON.parse(text):null;
}

function showLoading(msg){document.getElementById('loadingMsg').textContent=msg||'جاري التحميل...';document.getElementById('loadingOverlay').classList.add('show');}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show');}
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),3500);}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pw=document.getElementById('loginPw').value;
  const errEl=document.getElementById('loginErr');
  errEl.style.display='none';
  try{
    const res=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
    if(!res.ok){errEl.textContent='بيانات خاطئة';errEl.style.display='block';return;}
    const data=await res.json();
    if(data.role&&data.role!=='admin'){errEl.textContent='ليس لديك صلاحيات المدير';errEl.style.display='block';return;}
    token=data.access_token||data.token;
    localStorage.setItem('admin_token',token);
    showApp({email});
  }catch(e){errEl.textContent='خطأ في الاتصال';errEl.style.display='block';}
}
function logout(){token='';localStorage.removeItem('admin_token');location.reload();}
function showLogin(){document.getElementById('loginWrap').style.display='flex';document.getElementById('app').style.display='none';}
function showApp(user){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').style.display='block';
  if(user) document.getElementById('adminName').textContent=user.firstName||user.email||'';
  loadStats();loadVideos();loadContent();loadUsers();
}
(async function(){
  if(!token){showLogin();return;}
  try{await api('GET','/admin/stats');showApp(null);}catch(e){showLogin();}
})();

function showTab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

async function loadStats(){
  try{
    const s=await api('GET','/admin/stats');
    const grid=document.getElementById('statsGrid');
    grid.innerHTML='';
    const f=s.features||{};
    [{num:s.totalUsers||0,lbl:'المستخدمون'},{num:f.questionnaires||0,lbl:'الاستبيانات'},{num:f.cvs||0,lbl:'السير الذاتية'},{num:f.interviews||0,lbl:'المقابلات'},{num:f.businessPlans||0,lbl:'خطط العمل'},{num:f.pitches||0,lbl:'العروض'}].forEach(i=>{
      grid.innerHTML+='<div class="stat-card"><div class="label">'+i.lbl+'</div><div class="value">'+i.num+'</div></div>';
    });
  }catch(e){console.error(e);}
}

let videosList=[];
const catMap={cv:'السيرة الذاتية',interview:'المقابلات',skills:'المهارات',softskills:'مهارات شخصية',opportunities:'الفرص',entrepreneurship:'ريادة الأعمال'};
async function loadVideos(){
  try{
    videosList=await api('GET','/admin/videos');
    const tb=document.getElementById('videosBody');

  catch(e){showToast('فشل التغيير: '+e.message,'error');}

function setUploadStatus(elId,cls,text){
  const el=document.getElementById(elId);
  el.className='upload-status'+(cls?' '+cls:'');
  el.textContent=text;
}

let _videoUploading=false;

async function chunkedUpload(file,onProgress){
  const totalChunks=Math.ceil(file.size/CHUNK_SIZE);
  const uploadId=crypto.randomUUID();
  for(let i=0;i<totalChunks;i++){
    const start=i*CHUNK_SIZE;
    const end=Math.min(start+CHUNK_SIZE,file.size);
    const chunk=file.slice(start,end);
    const form=new FormData();
    form.append('chunk',chunk);
    await new Promise((resolve,reject)=>{
      const xhr=new XMLHttpRequest();
      xhr.open('POST',API+'/admin/upload/chunk');
      xhr.setRequestHeader('Authorization','Bearer '+token);
      xhr.setRequestHeader('x-upload-id',uploadId);
      xhr.setRequestHeader('x-chunk-index',String(i));
      xhr.onload=function(){
        if(xhr.status>=200&&xhr.status<300){resolve();}
        else{reject(new Error('فشل رفع الجزء '+(i+1)));}
      };
      xhr.onerror=function(){reject(new Error('خطأ في الاتصال'));};
      xhr.ontimeout=function(){reject(new Error('انتهت المهلة'));};
      xhr.timeout=25000;
      xhr.send(form);
    });
    if(onProgress) onProgress(i+1,totalChunks);
  }
  const mergeRes=await fetch(API+'/admin/upload/merge',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({uploadId:uploadId,filename:file.name,totalChunks:totalChunks})
  });
  if(!mergeRes.ok) throw new Error('فشل تجميع الملف');
  return await mergeRes.json();
}

async function uploadVideoFile(input){
  const file=input.files[0];if(!file)return;
  const sizeMB=(file.size/(1024*1024)).toFixed(1);
  const bar=document.getElementById('vProgressBar');
  const fill=document.getElementById('vProgressFill');
  const saveBtn=document.getElementById('videoSaveBtn');
  _videoUploading=true;
  saveBtn.disabled=true;saveBtn.style.opacity='.5';saveBtn.textContent='جاري الرفع...';
  bar.classList.add('show');fill.style.width='0%';
  setUploadStatus('vUploadStatus','info','جاري الرفع... 0% ('+sizeMB+' MB)');
  try{
    let data;
    if(file.size<=20*1024*1024){
      const form=new FormData();form.append('file',file);
      data=await new Promise((resolve,reject)=>{
        const xhr=new XMLHttpRequest();
        xhr.open('POST',API+'/admin/upload');
        xhr.setRequestHeader('Authorization','Bearer '+token);
        xhr.upload.onprogress=function(e){
          if(e.lengthComputable){
            const pct=Math.round(e.loaded/e.total*100);
            fill.style.width=pct+'%';
            setUploadStatus('vUploadStatus','info','جاري الرفع... '+pct+'% ('+sizeMB+' MB)');
          }
        };
        xhr.onload=function(){if(xhr.status>=200&&xhr.status<300){resolve(JSON.parse(xhr.responseText));}else{reject(new Error('فشل الرفع'));}};
        xhr.onerror=function(){reject(new Error('خطأ في الاتصال'));};
        xhr.ontimeout=function(){reject(new Error('انتهت المهلة'));};
        xhr.timeout=28000;
        xhr.send(form);
      });
    } else {
      data=await chunkedUpload(file,function(done,total){
        const pct=Math.round(done/total*100);
        fill.style.width=pct+'%';
        setUploadStatus('vUploadStatus','info','جاري الرفع... '+pct+'% — الجزء '+done+'/'+total+' ('+sizeMB+' MB)');
      });
    }
    document.getElementById('vUrl').value=location.origin+data.url;
    fill.style.width='100%';
    setUploadStatus('vUploadStatus','ok','تم رفع الملف بنجاح ('+sizeMB+' MB)');
  }catch(e){
    setUploadStatus('vUploadStatus','err',e.message);
    fill.style.width='0%';
  }finally{
    _videoUploading=false;
    saveBtn.disabled=false;saveBtn.style.opacity='1';saveBtn.textContent='حفظ';
  }
}
async function uploadThumbFile(input){
  const file=input.files[0];if(!file)return;
  setUploadStatus('vThumbUploadStatus','info','جاري رفع الصورة...');
  try{
    const form=new FormData();form.append('file',file);
    const r=await fetch(API+'/admin/upload',{method:'POST',headers:{'Authorization':'Bearer '+token},body:form});
    if(!r.ok)throw new Error(await r.text());
    const data=await r.json();
    const fullUrl=location.origin+data.url;
    document.getElementById('vThumb').value=fullUrl;
    document.getElementById('vThumbPreview').innerHTML='<img class="preview" src="'+fullUrl+'">';
    setUploadStatus('vThumbUploadStatus','ok','تم رفع الصورة');
  }catch(e){setUploadStatus('vThumbUploadStatus','err','فشل الرفع: '+e.message);}
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
document.querySelectorAll('.modal-overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});});
